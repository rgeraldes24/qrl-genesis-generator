# Extends the mainnet preset
PRESET_BASE: $PRESET_BASE
CONFIG_NAME: testnet # needs to exist because of Qrysm. Otherwise it conflicts with mainnet genesis

# Genesis
# ---------------------------------------------------------------
# `2**14` (= 16,384)
MIN_GENESIS_ACTIVE_VALIDATOR_COUNT: $NUMBER_OF_VALIDATORS
#HUMAN_TIME_PLACEHOLDER
MIN_GENESIS_TIME: $GENESIS_TIMESTAMP
GENESIS_FORK_VERSION: $GENESIS_FORK_VERSION
GENESIS_DELAY: $GENESIS_DELAY

# Time parameters
# ---------------------------------------------------------------
# 60 seconds
SECONDS_PER_SLOT: $SLOT_DURATION_IN_SECONDS
# 60 seconds
SECONDS_PER_EXECUTION_BLOCK: $SLOT_DURATION_IN_SECONDS
# 2**8 (= 256) epochs ~27 hours
MIN_VALIDATOR_WITHDRAWABILITY_DELAY: $MIN_VALIDATOR_WITHDRAWABILITY_DELAY
# 2**8 (= 256) epochs ~27 hours
SHARD_COMMITTEE_PERIOD: $SHARD_COMMITTEE_PERIOD
# 2**11 (= 2,048) Execution blocks ~8 hours
EXECUTION_FOLLOW_DISTANCE: $EXECUTION_FOLLOW_DISTANCE
SLOTS_PER_EPOCH: $SLOTS_PER_EPOCH
# 4
MAX_SEED_LOOKAHEAD: $MAX_SEED_LOOKAHEAD
# 16
EPOCHS_PER_EXECUTION_VOTING_PERIOD: $EPOCHS_PER_EXECUTION_VOTING_PERIOD

# Validator cycle
# ---------------------------------------------------------------
# 2**2 (= 4)
INACTIVITY_SCORE_BIAS: $INACTIVITY_SCORE_BIAS
# 2**4 (= 16)
INACTIVITY_SCORE_RECOVERY_RATE: $INACTIVITY_SCORE_RECOVERY_RATE
# 2**4 * 10**9 (= 16,000,000,000) Shor
EJECTION_BALANCE: $EJECTION_BALANCE
# 2**2 (= 4)
MIN_PER_EPOCH_CHURN_LIMIT: $MIN_PER_EPOCH_CHURN_LIMIT
# 2**16 (= 65,536)
CHURN_LIMIT_QUOTIENT: $CHURN_LIMIT_QUOTIENT
# 2**3 (= 8)
MAX_PER_EPOCH_ACTIVATION_CHURN_LIMIT: $MAX_PER_EPOCH_ACTIVATION_CHURN_LIMIT

# Withdrawals
# ---------------------------------------------------------------
MAX_VALIDATORS_PER_WITHDRAWALS_SWEEP: $MAX_VALIDATORS_PER_WITHDRAWALS_SWEEP

# Fork choice
# ---------------------------------------------------------------
# 40%
PROPOSER_SCORE_BOOST: $PROPOSER_SCORE_BOOST
# 160%
REORG_PARENT_WEIGHT_THRESHOLD: $REORG_PARENT_WEIGHT_THRESHOLD
# `2` epochs
REORG_MAX_EPOCHS_SINCE_FINALIZATION: $REORG_MAX_EPOCHS_SINCE_FINALIZATION

# Deposit contract
# ---------------------------------------------------------------
DEPOSIT_CHAIN_ID: $CHAIN_ID
DEPOSIT_NETWORK_ID: $CHAIN_ID
DEPOSIT_CONTRACT_ADDRESS: $DEPOSIT_CONTRACT_ADDRESS
